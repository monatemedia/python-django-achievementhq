name: publish

on:
  push:
    branches: ["main"]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.actor }}/python-django-achievementhq
  TAG: ${{ github.sha }}

jobs:
  publish:
    name: Publish Docker Image
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Enable Debugging Logs
        run: echo "ACTIONS_RUNNER_DEBUG=true" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        env:
          PAT: ${{ secrets.PAT }}
        run: echo "$PAT" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Validate Secrets Injection
        run: |
          if [ -z "${{ secrets.DJANGO_ALLOWED_HOSTS }}" ]; then
            echo "Error: DJANGO_ALLOWED_HOSTS is missing or empty"
          else
            echo "DJANGO_ALLOWED_HOSTS is set"
          fi
          if [ -z "${{ secrets.DJANGO_DEBUG }}" ]; then
            echo "Error: DJANGO_DEBUG is missing or empty"
          else
            echo "DJANGO_DEBUG is set"
          fi
          if [ -z "${{ secrets.ADMIN_USER }}" ]; then
            echo "Error: ADMIN_USER is missing or empty"
          else
            echo "ADMIN_USER is set"
          fi
          if [ -z "${{ secrets.ADMIN_EMAIL }}" ]; then
            echo "Error: ADMIN_EMAIL is missing or empty"
          else
            echo "ADMIN_EMAIL is set"
          fi
          if [ -z "${{ secrets.ADMIN_PASSWORD }}" ]; then
            echo "Error: ADMIN_PASSWORD is missing or empty"
          else
            echo "ADMIN_PASSWORD is set"
          fi
          if [ -z "${{ secrets.FAKE_USER_PASSWORD }}" ]; then
            echo "Error: FAKE_USER_PASSWORD is missing or empty"
          else
            echo "FAKE_USER_PASSWORD is set"
          fi
          if [ -z "${{ secrets.DB_NAME }}" ]; then
            echo "Error: DB_NAME is missing or empty"
          else
            echo "DB_NAME is set"
          fi
          if [ -z "${{ secrets.DB_USER }}" ]; then
            echo "Error: DB_USER is missing or empty"
          else
            echo "DB_USER is set"
          fi
          if [ -z "${{ secrets.DB_PASSWORD }}" ]; then
            echo "Error: DB_PASSWORD is missing or empty"
          else
            echo "DB_PASSWORD is set"
          fi
          if [ -z "${{ secrets.DB_HOST }}" ]; then
            echo "Error: DB_HOST is missing or empty"
          else
            echo "DB_HOST is set"
          fi
          if [ -z "${{ secrets.DB_PORT }}" ]; then
            echo "Error: DB_PORT is missing or empty"
          else
            echo "DB_PORT is set"
          fi
          if [ -z "${{ secrets.DJANGO_SECRET_KEY }}" ]; then
            echo "Error: DJANGO_SECRET_KEY is missing or empty"
          else
            echo "DJANGO_SECRET_KEY is set"
          fi

      - name: Build and Push Docker Image
        env:
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          DJANGO_ALLOWED_HOSTS: ${{ secrets.DJANGO_ALLOWED_HOSTS }}
          DJANGO_DEBUG: ${{ secrets.DJANGO_DEBUG }}
        run: |
          echo "Building Docker image with the following parameters:"
          echo "REGISTRY: $REGISTRY"
          echo "IMAGE_NAME: $IMAGE_NAME"
          echo "TAG: $TAG"

          # Build the Docker image
          docker build . \
            --build-arg DJANGO_SECRET_KEY=${{ secrets.DJANGO_SECRET_KEY }} \
            --build-arg DJANGO_ALLOWED_HOSTS=${{ secrets.DJANGO_ALLOWED_HOSTS }} \
            --build-arg DJANGO_DEBUG=${{ secrets.DJANGO_DEBUG }} \
            --tag $REGISTRY/$IMAGE_NAME:$TAG \
            --tag $REGISTRY/$IMAGE_NAME:latest

          # Push the images
          docker push $REGISTRY/$IMAGE_NAME:$TAG
          docker push $REGISTRY/$IMAGE_NAME:latest
